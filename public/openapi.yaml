openapi: 3.0.3
info:
  title: Adventurers Guild API
  version: 1.1.0
  description: A fantasy-themed API for backend testing practice.

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://adventurers-guild-api.vercel.app
    description: Production

paths:
  /api/attributes:
    get:
      summary: List all attributes
      description: Returns the six core RPG attributes with their descriptions and related skills.
      tags:
        - Attributes
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attribute'

  /api/skills:
    get:
      summary: List all skills
      description: Returns the full list of available skills and their related attribute.
      tags:
        - Skills
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'

components:
  schemas:
    Attribute:
      type: object
      required:
        - id
        - name
        - shortName
        - description
        - skills
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Strength
        shortName:
          type: string
          enum:
            - STR
            - DEX
            - CON
            - INT
            - WIS
            - CHA
          example: STR
        description:
          type: string
          example: Measures physical power, carrying capacity, and effectiveness in brute-force actions such as lifting, pushing, and melee attacks.
        skills:
          type: array
          items:
            type: string
          example:
            - Athletics

    Skill:
      type: object
      required:
        - id
        - name
        - attribute
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Athletics
        attribute:
          type: string
          enum:
            - STR
            - DEX
            - CON
            - INT
            - WIS
            - CHA
          example: STR
