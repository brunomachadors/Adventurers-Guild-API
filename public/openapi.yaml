                              - bonus: 1
                                count: 1
                                mustBeDifferentFromBonus: 2
                          - type: plus1_each_suggested
                            basedOn: abilityscores
                    selectedAbilityScores: null
                    availableChoices:
                      - CON
                      - INT
                      - WIS
                selectedScores:
                  summary: Ability scores already selected
                  value:
                    characterId: 101
                    backgroundId: 13
                    backgroundName: Sage
                    selectionRules:
                      source: background
                      allowedChoices:
                        - CON
                        - INT
                        - WIS
                      bonusRules:
                        mode: standard_background
                        options:
                          - type: plus2_plus1
                            choices:
                              - bonus: 2
                                count: 1
                              - bonus: 1
                                count: 1
                                mustBeDifferentFromBonus: 2
                          - type: plus1_each_suggested
                            basedOn: abilityscores
                    selectedAbilityScores:
                      base:
                        STR: 8
                        DEX: 14
                        CON: 13
                        INT: 15
                        WIS: 12
                        CHA: 10
                      bonuses:
                        STR: 0
                        DEX: 0
                        CON: 0
                        INT: 2
                        WIS: 1
                        CHA: 0
                      final:
                        STR: 8
                        DEX: 14
                        CON: 13
                        INT: 17
                        WIS: 13
                        CHA: 10
                    availableChoices:
                      - CON
                      - INT
                      - WIS
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Character not found
        '500':
          description: Failed to fetch character ability score options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch character ability score options

  /api/characters/{id}/ability-scores:
    put:
      tags:
        - Characters
      operationId: updateCharacterAbilityScores
      summary: Update character ability scores
      description: |
        Persists the selected ability scores for the character and returns the updated ability score selection state.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterAbilityScoresUpdateRequestBody'
            example:
              abilityScores:
                base:
                  STR: 8
                  DEX: 14
                  CON: 13
                  INT: 15
                  WIS: 12
                  CHA: 10
                bonuses:
                  STR: 0
                  DEX: 0
                  CON: 0
                  INT: 2
                  WIS: 1
                  CHA: 0
      responses:
        '200':
          description: Character ability scores updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterAbilityScoreOptionsResponseBody'
        '400':
          description: Invalid character ability scores payload or unavailable selection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPayload:
                  summary: Invalid payload
                  value:
                    error: Invalid character ability scores payload
                unavailableSelection:
                  summary: Background does not support ability score selection
                  value:
                    error: Ability score selection is not available for this character
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Character not found
        '500':
          description: Failed to update character ability scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to update character ability scores

  /api/characters/{id}/spell-options:
    get:
      tags:
        - Characters
      operationId: getCharacterSpellOptions
      summary: Get character spell options
      description: |
        Returns the spells available to the character based on the assigned class.
        If the character has no spellcasting class, `spells` is returned as an empty array.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      responses:
        '200':
          description: Character spell options returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterSpellOptionsResponseBody'
              examples:
                nonCaster:
                  summary: Non-spellcasting class
                  value:
                    characterId: 101
                    classId: 1
                    className: Barbarian
                    spells: []
                wizard:
                  summary: Wizard spell options
                  value:
                    characterId: 101
                    classId: 12
                    className: Wizard
                    spells:
                      - id: 1
                        name: Acid Splash
                        level: 0
                        levelLabel: Cantrip
                      - id: 18
                        name: Alarm
                        level: 1
                        levelLabel: Level 1
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Character not found
        '500':
          description: Failed to fetch character spell options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch character spell options

  /api/characters/{id}/spell-selection:
    get:
      tags:
        - Characters
      operationId: getCharacterSpellSelection
      summary: Get character spell selection state
      description: |
        Returns current selection rules, selected spells, and available spells for the character.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      responses:
        '200':
          description: Character spell selection returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterSpellSelectionResponseBody'
              example:
                characterId: 101
                classId: 12
                className: Wizard
                level: 1
                selectionRules:
                  canSelectSpells: true
                  selectionType: prepared
                  maxCantrips: 3
                  maxSpells: 0
                selectedSpells: []
                availableSpells:
                  - id: 1
                    name: Acid Splash
                    level: 0
                    levelLabel: Cantrip
                  - id: 18
                    name: Alarm
                    level: 1
                    levelLabel: Level 1
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Character not found
        '500':
          description: Failed to fetch character spell selection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch character spell selection

  /api/characters/{id}/spells:
    put:
      tags:
        - Characters
      operationId: updateCharacterSpells
      summary: Replace selected character spells
      description: |
        Replaces the character's selected spells based on the current spell selection rules.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterSpellSelectionUpdateRequestBody'
            example:
              spellIds:
                - 1
                - 2
                - 3
      responses:
        '200':
          description: Character spells updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterSpellSelectionResponseBody'
        '400':
          description: Invalid character spell selection payload or invalid spell selection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPayload:
                  summary: Invalid payload
                  value:
                    error: Invalid character spell selection payload
                duplicates:
                  summary: Duplicate spell ids
                  value:
                    error: Duplicate spell ids are not allowed
                unavailableSelection:
                  summary: Class cannot select spells
                  value:
                    error: Spell selection is not available for this character
                invalidSpell:
                  summary: Invalid spell id for character
                  value:
                    error: One or more spells are invalid for this character
                tooManyCantrips:
                  summary: Too many cantrips
                  value:
                    error: Too many cantrips selected
                tooManySpells:
                  summary: Too many leveled spells
                  value:
                    error: Too many spells selected
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Character not found
        '500':
          description: Failed to update character spells
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to update character spells

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CharacterId:
      name: id
      in: path
      required: true
      description: Character numeric identifier.
      schema:
        type: integer
        minimum: 1

    CharacterEquipmentId:
      name: equipmentId
      in: path
      required: true
      description: Equipment numeric identifier attached to the character.
      schema:
        type: integer
        minimum: 1

  schemas:
    TokenRequestBody:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: <your-username>
        password:
          type: string
          example: <your-password>

    TokenResponseBody:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwib3duZXJJZCI6MSwidXNlcm5hbWUiOiJkZW1vIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjE3MDAwMDM2MDB9.signature

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Character deleted successfully

    AttributeShortname:
      type: string
      enum:
        - STR
        - DEX
        - CON
        - INT
        - WIS
        - CHA
      example: STR

    SkillName:
      type: string
      enum:
        - Athletics
        - Acrobatics
        - Sleight of Hand
        - Stealth
        - Arcana
        - History
        - Investigation
        - Nature
        - Religion
        - Animal Handling
        - Insight
        - Medicine
        - Perception
        - Survival
        - Deception
        - Intimidation
        - Performance
        - Persuasion
      example: Athletics

    Attribute:
      type: object
      required:
        - id
        - name
        - shortname
        - description
        - skills
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Strength
        shortname:
          $ref: '#/components/schemas/AttributeShortname'
        description:
          type: string
          example: Measures physical power, carrying capacity, and effectiveness in brute-force actions such as lifting, pushing, and melee attacks.
        skills:
          type: array
          description: List of skill names associated with the attribute.
          items:
            $ref: '#/components/schemas/SkillName'
          example:
            - Athletics

    BackgroundListItem:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Acolyte

    BackgroundDetail:
      type: object
      required:
        - id
        - name
        - slug
        - description
        - abilityScores
        - feat
        - skillProficiencies
        - toolProficiency
        - equipmentOptions
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Acolyte
        slug:
          type: string
          example: acolyte
        description:
          type: string
          example: You devoted yourself to service in a temple, either nestled in a town or secluded in a sacred grove.
        abilityScores:
          type: array
          items:
            $ref: '#/components/schemas/AttributeShortname'
          example:
            - INT
            - WIS
            - CHA
        feat:
          type: string
          example: Magic Initiate (Cleric)
        skillProficiencies:
          type: array
          items:
            $ref: '#/components/schemas/SkillName'
          example:
            - Insight
            - Religion
        toolProficiency:
          type: string
          nullable: true
          example: Calligrapher's Supplies
        equipmentOptions:
          type: array
          items:
            type: string
          example:
            - Calligrapher's Supplies, Book (prayers), Holy Symbol, Parchment (10 sheets), Robe, 8 GP
            - 50 GP

    EquipmentListItem:
      type: object
      required:
        - id
        - name
        - category
        - type
        - cost
        - weight
        - isMagical
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Club
        category:
          type: string
          example: Weapon
        type:
          type: string
          example: Weapon
        cost:
          type: string
          example: 1 sp
        weight:
          type: number
          nullable: true
          example: 2
        isMagical:
          type: boolean
          example: false

    EquipmentDamageDie:
      type: object
      required:
        - count
        - value
      properties:
        count:
          type: integer
          example: 1
        value:
          type: integer
          example: 4

    EquipmentDamage:
      type: object
      required:
        - formula
        - dice
        - bonus
        - damageType
      properties:
        formula:
          type: string
          example: 1d4
        dice:
          type: array
          items:
            $ref: '#/components/schemas/EquipmentDamageDie'
        bonus:
          type: integer
          example: 0
        damageType:
          type: string
          example: Bludgeoning

    EquipmentRange:
      type: object
      required:
        - normal
        - long
        - unit
      properties:
        normal:
          type: integer
          nullable: true
          example: 20
        long:
          type: integer
          nullable: true
          example: 60
        unit:
          type: string
          enum:
            - ft
          example: ft

    EquipmentProperty:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          example: Thrown
        slug:
          type: string
          example: thrown
        range:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EquipmentRange'
        ammunitionType:
          type: string
          nullable: true
          example: Arrow
        damage:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EquipmentDamage'
        note:
          type: string
          nullable: true
          example: unless mounted

    EquipmentMastery:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          example: Slow
        slug:
          type: string
          example: slow

    EquipmentArmorClass:
      type: object
      required:
        - base
        - dexModifier
      properties:
        base:
          type: integer
          example: 16
        dexModifier:
          type: object
          required:
            - applies
            - max
          properties:
            applies:
              type: boolean
              example: false
            max:
              type: integer
              nullable: true
              example: null

    EquipmentModifier:
      type: object
      required:
        - type
        - value
        - target
        - condition
      properties:
        type:
          type: string
          enum:
            - attackBonus
            - damageBonus
            - armorClassBonus
            - abilityScoreBonus
            - skillBonus
            - savingThrowBonus
            - speedBonus
          example: armorClassBonus
        value:
          type: integer
          example: 1
        target:
          type: string
          nullable: true
          example: AC
        condition:
          type: string
          nullable: true
          example: while equipped

    EquipmentEffect:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          example: Stealth Disadvantage
        description:
          type: string
          example: You have disadvantage on Dexterity (Stealth) checks while wearing this armor.

    EquipmentWeaponDetails:
      type: object
      required:
        - kind
        - weaponCategory
        - attackType
        - damage
        - versatileDamage
        - properties
        - mastery
        - range
        - proficiencyType
        - ammunitionType
      properties:
        kind:
          type: string
          enum:
            - weapon
        weaponCategory:
          type: string
          example: Simple
        attackType:
          type: string
          example: Melee
        damage:
          $ref: '#/components/schemas/EquipmentDamage'
        versatileDamage:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EquipmentDamage'
        properties:
          type: array
          items:
            $ref: '#/components/schemas/EquipmentProperty'
        mastery:
          $ref: '#/components/schemas/EquipmentMastery'
        range:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EquipmentRange'
        proficiencyType:
          type: string
          example: Simple Weapons
        ammunitionType:
          type: string
          nullable: true
          example: null

    EquipmentArmorDetails:
      type: object
      required:
        - kind
        - armorType
        - trainingType
        - armorClass
        - strengthRequirement
        - stealthDisadvantage
        - donTime
        - doffTime
      properties:
        kind:
          type: string
          enum:
            - armor
        armorType:
          type: string
          example: Heavy Armor
        trainingType:
          type: string
          example: Heavy Armor
        armorClass:
          $ref: '#/components/schemas/EquipmentArmorClass'
        strengthRequirement:
          type: integer
          nullable: true
          example: 13
        stealthDisadvantage:
          type: boolean
          example: true
        donTime:
          type: string
          example: 5 minutes
        doffTime:
          type: string
          example: 1 minute

    EquipmentShieldDetails:
      type: object
      required:
        - kind
        - trainingType
        - armorClassBonus
        - donTime
        - doffTime
      properties:
        kind:
          type: string
          enum:
            - shield
        trainingType:
          type: string
          example: Shield
        armorClassBonus:
          type: integer
          example: 2
        donTime:
          type: string
          example: 1 action
        doffTime:
          type: string
          example: 1 action

    EquipmentGenericDetails:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - generic

    EquipmentDetails:
      oneOf:
        - $ref: '#/components/schemas/EquipmentWeaponDetails'
        - $ref: '#/components/schemas/EquipmentArmorDetails'
        - $ref: '#/components/schemas/EquipmentShieldDetails'
        - $ref: '#/components/schemas/EquipmentGenericDetails'

    EquipmentDetail:
      type: object
      required:
        - id
        - name
        - slug
        - category
        - type
        - description
        - cost
        - weight
        - isMagical
        - modifiers
        - effects
        - details
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Club
        slug:
          type: string
          example: club
        category:
          type: string
          example: Weapon
        type:
          type: string
          example: Weapon
        description:
          type: string
          example: A simple melee weapon.
        cost:
          type: string
          example: 1 sp
        weight:
          type: number
          nullable: true
          example: 2
        isMagical:
          type: boolean
          example: false
        modifiers:
          type: array
          items:
            $ref: '#/components/schemas/EquipmentModifier'
        effects:
          type: array
          items:
            $ref: '#/components/schemas/EquipmentEffect'
        details:
          $ref: '#/components/schemas/EquipmentDetails'

    SkillListItem:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          example: 1
        name:
          $ref: '#/components/schemas/SkillName'

    SkillDetail:
      type: object
      required:
        - id
        - name
        - attribute
        - description
        - exampleofuse
        - commonclasses
      properties:
        id:
          type: integer
          example: 1
        name:
          $ref: '#/components/schemas/SkillName'
        attribute:
          $ref: '#/components/schemas/AttributeShortname'
        description:
          type: string
          example: Represents physical capability in actions such as climbing, jumping, swimming, or forcing objects through strength.
        exampleofuse:
          type: string
          example: Used when a character tries to climb a castle wall or force open a heavy gate.
        commonclasses:
          type: array
          items:
            type: string
          example:
            - Fighter
            - Barbarian
            - Paladin
            - Ranger

    ClassRole:
      type: string
      enum:
        - melee
        - caster
        - support
        - stealth
        - hybrid
      example: caster

    ClassListItem:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          example: 12
        name:
          type: string
          example: Wizard

    ClassSpellcasting:
      type: object
      required:
        - ability
      properties:
        ability:
          $ref: '#/components/schemas/AttributeShortname'
        usesSpellbook:
          type: boolean
          example: true
        canCastRituals:
          type: boolean
          example: true
        selection:
          $ref: '#/components/schemas/ClassSpellSelection'

    ClassSpellSelectionType:
      type: string
      enum:
        - known
        - prepared
      example: prepared

    ClassSpellSelection:
      type: object
      required:
        - selectionType
      properties:
        selectionType:
          $ref: '#/components/schemas/ClassSpellSelectionType'
        cantrips:
          type: object
          additionalProperties:
            type: integer
          example:
            '1': 3
        spells:
          type: object
          additionalProperties:
            type: integer
          example:
            '1': 2
        preparedSpells:
          type: object
          additionalProperties:
            type: integer
          example:
            '1': 4
        spellbookSpells:
          type: object
          additionalProperties:
            type: integer
          example:
            '1': 6
        spellsAddedPerLevel:
          type: integer
          example: 2
        mode:
          type: string
          example: spellbook_plus_prepared
        changesWhen:
          type: string
          example: long_rest

    ClassFeatureItem:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          example: Spellcasting
        description:
          type: string
          example: You can prepare and cast wizard spells.

    ClassLevelProgressionItem:
      type: object
      required:
        - level
        - features
      properties:
        level:
          type: integer
          example: 1
        features:
          type: array
          items:
            $ref: '#/components/schemas/ClassFeatureItem'

    ClassDetail:
      type: object
      required:
        - id
        - name
        - slug
        - primaryattributes
        - recommendedskills
        - savingthrows
        - hitdie
        - role
        - description
        - spellcasting
        - subclasses
        - levelprogression
      properties:
        id:
          type: integer
          example: 12
        name:
          type: string
          example: Wizard
        slug:
          type: string
          example: wizard
        primaryattributes:
          type: array
          items:
            $ref: '#/components/schemas/AttributeShortname'
          example:
            - INT
        recommendedskills:
          type: array
          items:
            $ref: '#/components/schemas/SkillName'
          example:
            - Arcana
            - Investigation
            - History
            - Nature
            - Religion
        savingthrows:
          type: array
          items:
            $ref: '#/components/schemas/AttributeShortname'
          example:
            - INT
            - WIS
        hitdie:
          type: integer
          example: 6
        role:
          $ref: '#/components/schemas/ClassRole'
        description:
          type: string
          example: A learned arcane scholar who studies the inner workings of magic to prepare spells, master rituals, and wield unmatched magical versatility.
        spellcasting:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ClassSpellcasting'
        subclasses:
          type: array
          items:
            type: string
          example:
            - Evoker
        levelprogression:
          type: array
          items:
            $ref: '#/components/schemas/ClassLevelProgressionItem'

    SpellListItem:
      type: object
      required:
        - id
        - name
        - level
        - levelLabel
      properties:
        id:
          type: integer
