                  spellcasting:
                    ability: INT
                    usesSpellbook: true
                    canCastRituals: true
                    selection:
                      mode: spellbook_plus_prepared
                      selectionType: prepared
                      changesWhen: long_rest
                      cantrips:
                        '1': 3
                      preparedSpells:
