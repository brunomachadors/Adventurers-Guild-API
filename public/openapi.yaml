openapi: 3.0.3

info:
  title: Adventurers Guild API
  version: 1.2.0
  description: |
    A fantasy-themed API designed for learning **backend testing** and **API automation**.

    This project is part of a testing-focused RPG domain and currently includes:

    - **Attributes** → core RPG attributes such as STR, DEX, and WIS
    - **Skills** → simplified list and detailed lookup by id or slug
    - **Classes** → simplified list of playable RPG classes

    This API is ideal for practicing:
    - API schema validation
    - response assertions
    - path parameter validation
    - automated tests with Playwright
    - OpenAPI-based documentation

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://adventurers-guild-api.vercel.app
    description: Production

tags:
  - name: Attributes
    description: Core RPG attributes such as Strength, Dexterity, and Wisdom.
  - name: Skills
    description: Skills related to RPG attributes, including detail lookups.
  - name: Classes
    description: Playable RPG character classes.

x-tagGroups:
  - name: Core Resources
    tags:
      - Attributes
      - Skills
      - Classes

paths:
  /api/attributes:
    get:
      tags:
        - Attributes
      operationId: getAttributes
      summary: List all attributes
      description: |
        Returns the six core RPG attributes with their descriptions and related skills.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attribute'
              example:
                - id: 1
                  name: Strength
                  shortname: STR
                  description: Measures physical power, carrying capacity, and effectiveness in brute-force actions such as lifting, pushing, and melee attacks.
                  skills:
                    - Athletics
                - id: 2
                  name: Dexterity
                  shortname: DEX
                  description: Measures agility, reflexes, balance, and coordination. It affects actions that require speed, precision, and stealth.
                  skills:
                    - Acrobatics
                    - Sleight of Hand
                    - Stealth
                - id: 3
                  name: Constitution
                  shortname: CON
                  description: Measures endurance, resilience, and physical toughness. It is commonly associated with health, stamina, and resistance to harm.
                  skills: []
                - id: 4
                  name: Intelligence
                  shortname: INT
                  description: Measures reasoning, memory, knowledge, and analytical ability. It is linked to learning, investigation, and logical thinking.
                  skills:
                    - Arcana
                    - History
                    - Investigation
                    - Nature
                    - Religion
                - id: 5
                  name: Wisdom
                  shortname: WIS
                  description: Measures perception, intuition, awareness, and good judgment. It reflects how well a character understands the world around them.
                  skills:
                    - Animal Handling
                    - Insight
                    - Medicine
                    - Perception
                    - Survival
                - id: 6
                  name: Charisma
                  shortname: CHA
                  description: Measures presence, confidence, influence, and social impact. It affects persuasion, leadership, and interpersonal interactions.
                  skills:
                    - Deception
                    - Intimidation
                    - Performance
                    - Persuasion

  /api/skills:
    get:
      tags:
        - Skills
      operationId: getSkills
      summary: List all skills
      description: |
        Returns a simplified list of all available skills.

        This endpoint is intentionally lightweight and only exposes:
        - `id`
        - `name`
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SkillListItem'
              example:
                - id: 1
                  name: Athletics
                - id: 2
                  name: Acrobatics
                - id: 3
                  name: Sleight of Hand
                - id: 4
                  name: Stealth

  /api/skills/{identifier}:
    get:
      tags:
        - Skills
      operationId: getSkillByIdentifier
      summary: Get skill by id or name
      description: |
        Returns detailed information about a skill.

        The `identifier` path parameter supports:
        - numeric id → `/api/skills/1`
        - slug name → `/api/skills/stealth`
        - multi-word slug → `/api/skills/animal-handling`
      parameters:
        - name: identifier
          in: path
          required: true
          description: Skill identifier. Can be a numeric id or a slug name.
          schema:
            type: string
          examples:
            byId:
              summary: Search by id
              value: '1'
            byName:
              summary: Search by slug
              value: stealth
            byComplexName:
              summary: Search by multi-word slug
              value: animal-handling
      responses:
        '200':
          description: Skill found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDetail'
              examples:
                byId:
                  summary: Example response for Athletics
                  value:
                    id: 1
                    name: Athletics
                    attribute: STR
                    description: Represents physical capability in actions such as climbing, jumping, swimming, or forcing objects through strength.
                    exampleofuse: Used when a character tries to climb a castle wall or force open a heavy gate.
                    commonclasses:
                      - Fighter
                      - Barbarian
                      - Paladin
                byName:
                  summary: Example response for Stealth
                  value:
                    id: 4
                    name: Stealth
                    attribute: DEX
                    description: Represents the ability to move silently, remain unseen, and avoid detection.
                    exampleofuse: Used when a character sneaks past guards or hides in the shadows.
                    commonclasses:
                      - Rogue
                      - Ranger
                      - Monk
        '404':
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Skill not found

  /api/classes:
    get:
      tags:
        - Classes
      operationId: getClasses
      summary: List all classes
      description: |
        Returns a simplified list of RPG classes.

        This endpoint currently exposes:
        - `id`
        - `name`

        Future versions may include detailed lookup endpoints for class information.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassListItem'
              example:
                - id: 1
                  name: Fighter
                - id: 2
                  name: Wizard
                - id: 3
                  name: Rogue
                - id: 4
                  name: Cleric
                - id: 5
                  name: Ranger
                - id: 6
                  name: Paladin

components:
  schemas:
    Attribute:
      type: object
      required:
        - id
        - name
        - shortname
        - description
        - skills
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Strength
        shortname:
          type: string
          enum:
            - STR
            - DEX
            - CON
            - INT
            - WIS
            - CHA
          example: STR
        description:
          type: string
          example: Measures physical power, carrying capacity, and effectiveness in brute-force actions such as lifting, pushing, and melee attacks.
        skills:
          type: array
          description: List of skills related to the attribute.
          items:
            type: string
          example:
            - Athletics

    SkillListItem:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Athletics

    SkillDetail:
      type: object
      required:
        - id
        - name
        - attribute
        - description
        - exampleofuse
        - commonclasses
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Athletics
        attribute:
          type: string
          enum:
            - STR
            - DEX
            - CON
            - INT
            - WIS
            - CHA
          example: STR
        description:
          type: string
          example: Represents physical capability in actions such as climbing, jumping, swimming, or forcing objects through strength.
        exampleofuse:
          type: string
          example: Used when a character tries to climb a castle wall or force open a heavy gate.
        commonclasses:
          type: array
          items:
            type: string
          example:
            - Fighter
            - Barbarian
            - Paladin

    ClassListItem:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Fighter

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Skill not found
