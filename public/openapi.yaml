                    name: Acid Splash
                    slug: acid-splash
                    level: 0
                    levelLabel: Cantrip
                    school: Evocation
                    castingTime: Action
                    range: 60 feet
                    components:
                      - V
                      - S
                    duration: Instantaneous
                    selectionType: cantrip
                currency:
                  cp: 0
                  sp: 0
                  ep: 0
                  gp: 8
                  pp: 0
                abilityScoreRules:
                  source: background
                  allowedChoices:
