openapi: 3.0.3

info:
  title: Adventurers Guild API
  version: 1.5.0
  description: |
    Fantasy-themed API designed for backend testing, API automation, and contract validation practice.

    The documentation in this file reflects the current public routes implemented by the API:

    - Auth token issuance
    - Attributes list
    - Backgrounds list and detail
    - Skills list and detail
    - Classes list and detail
    - Spells list and detail
    - Species list and detail
    - Character management and character spell flows

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://adventurers-guild-api.vercel.app
    description: Production

tags:
  - name: Auth
    description: Authentication and bearer token issuance.
  - name: Attributes
    description: Core RPG attributes such as Strength, Dexterity, and Wisdom.
  - name: Backgrounds
    description: Character backgrounds list and detail endpoints.
  - name: Skills
    description: Skills list and skill detail endpoints.
  - name: Classes
    description: Playable RPG classes, including detail payloads.
  - name: Spells
    description: Spell list and spell detail endpoints.
  - name: Species
    description: Species list and species detail endpoints.
  - name: Characters
    description: Protected character management and character spell selection endpoints.

x-tagGroups:
  - name: Access
    tags:
      - Auth
  - name: Core Resources
    tags:
      - Attributes
      - Backgrounds
      - Skills
      - Classes
      - Spells
      - Species
  - name: Character Management
    tags:
      - Characters

paths:
  /api/auth/token:
    post:
      tags:
        - Auth
      operationId: issueAuthToken
      summary: Issue bearer token
      description: |
        Validates owner credentials and returns a JWT-like bearer token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequestBody'
            example:
              username: demo
              password: demo123
      responses:
        '200':
          description: Token issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponseBody'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwib3duZXJJZCI6MSwidXNlcm5hbWUiOiJkZW1vIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjE3MDAwMDM2MDB9.signature
        '400':
          description: Invalid token request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid token request payload
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid credentials
        '500':
          description: Failed to issue token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to issue token

  /api/attributes:
    get:
      tags:
        - Attributes
      operationId: getAttributes
      summary: List all attributes
      description: |
        Returns the six core RPG attributes with their descriptions and the skill names associated with each attribute.
      responses:
        '200':
          description: Attributes returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attribute'
              example:
                - id: 1
                  name: Strength
                  shortname: STR
                  description: Measures physical power, carrying capacity, and effectiveness in brute-force actions such as lifting, pushing, and melee attacks.
                  skills:
                    - Athletics
                - id: 2
                  name: Dexterity
                  shortname: DEX
                  description: Measures agility, reflexes, balance, and coordination. It affects actions that require speed, precision, and stealth.
                  skills:
                    - Acrobatics
                    - Sleight of Hand
                    - Stealth

  /api/backgrounds:
    get:
      tags:
        - Backgrounds
      operationId: getBackgrounds
      summary: List all backgrounds
      description: |
        Returns a lightweight list of character backgrounds.

        This endpoint exposes only:
        - `id`
        - `name`
      responses:
        '200':
          description: Backgrounds returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BackgroundListItem'
              example:
                - id: 1
                  name: Acolyte
                - id: 5
                  name: Criminal
                - id: 13
                  name: Sage
                - id: 16
                  name: Soldier
        '500':
          description: Failed to fetch backgrounds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch backgrounds

  /api/backgrounds/{identifier}:
    get:
      tags:
        - Backgrounds
      operationId: getBackgroundByIdentifier
      summary: Get background detail by identifier
      description: |
        Returns detailed information about a background.

        Supported identifiers:
        - numeric id, for example `/api/backgrounds/1`
        - slug, for example `/api/backgrounds/acolyte`
        - name or slug in a case-insensitive form, for example `/api/backgrounds/SOLDIER`
      parameters:
        - name: identifier
          in: path
          required: true
          description: Background identifier as numeric id, name, or slug. Name and slug lookup are case-insensitive.
          schema:
            type: string
          examples:
            byId:
              summary: Search by id
              value: '1'
            bySlug:
              summary: Search by slug
              value: acolyte
            byUppercaseName:
              summary: Search by uppercase name
              value: SOLDIER
      responses:
        '200':
          description: Background found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackgroundDetail'
              examples:
                acolyte:
                  summary: Acolyte detail
                  value:
                    id: 1
                    name: Acolyte
                    slug: acolyte
                    description: You devoted yourself to service in a temple, either nestled in a town or secluded in a sacred grove. There you performed rites in honor of a god or pantheon. You served under a priest and studied religion. Thanks to your priest's instruction and your own devotion, you also learned how to channel a modicum of divine power in service to your place of worship and the people who prayed there.
                    abilityScores:
                      - INT
                      - WIS
                      - CHA
                    feat: Magic Initiate (Cleric)
                    skillProficiencies:
                      - Insight
                      - Religion
                    toolProficiency: Calligrapher's Supplies
                    equipmentOptions:
                      - Calligrapher's Supplies, Book (prayers), Holy Symbol, Parchment (10 sheets), Robe, 8 GP
                      - 50 GP
                soldier:
                  summary: Soldier detail
                  value:
                    id: 16
                    name: Soldier
                    slug: soldier
                    description: You began training for war as soon as you reached adulthood and carry precious few memories of life before you took up arms. Battle is in your blood. Sometimes you catch yourself reflexively performing the basic fighting exercises you learned first. Eventually, you put that training to use on the battlefield, protecting the realm by waging war.
                    abilityScores:
                      - STR
                      - DEX
                      - CON
                    feat: Savage Attacker
                    skillProficiencies:
                      - Athletics
                      - Intimidation
                    toolProficiency: One kind of Gaming Set
                    equipmentOptions:
                      - Spear, Shortbow, 20 Arrows, Gaming Set (same as above), Healer's Kit, Quiver, Traveler's Clothes, 14 GP
                      - 50 GP
        '404':
          description: Background not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Background not found
        '500':
          description: Failed to fetch background detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch background detail

  /api/skills:
    get:
      tags:
        - Skills
      operationId: getSkills
      summary: List all skills
      description: |
        Returns a lightweight list of available skills.

        This endpoint exposes only:
        - `id`
        - `name`
      responses:
        '200':
          description: Skills returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SkillListItem'
              example:
                - id: 1
                  name: Athletics
                - id: 2
                  name: Acrobatics
                - id: 3
                  name: Sleight of Hand
                - id: 4
                  name: Stealth

  /api/skills/{identifier}:
    get:
      tags:
        - Skills
      operationId: getSkillByIdentifier
      summary: Get skill detail by identifier
      description: |
        Returns detailed information about a skill.

        Supported identifiers:
        - numeric id, for example `/api/skills/1`
        - slug, for example `/api/skills/animal-handling`
        - normalized name, for example `/api/skills/stealth`
      parameters:
        - name: identifier
          in: path
          required: true
          description: Skill identifier as numeric id, slug, or normalized name.
          schema:
            type: string
          examples:
            byId:
              summary: Search by id
              value: '1'
            bySlug:
              summary: Search by slug
              value: animal-handling
            byName:
              summary: Search by normalized name
              value: stealth
      responses:
        '200':
          description: Skill found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDetail'
              examples:
                athletics:
                  summary: Athletics detail
                  value:
                    id: 1
                    name: Athletics
                    attribute: STR
                    description: Represents physical capability in actions such as climbing, jumping, swimming, or forcing objects through strength.
                    exampleofuse: Used when a character tries to climb a castle wall or force open a heavy gate.
                    commonclasses:
                      - Fighter
                      - Barbarian
                      - Paladin
                      - Ranger
                stealth:
                  summary: Stealth detail
                  value:
                    id: 4
                    name: Stealth
                    attribute: DEX
                    description: Represents the ability to move silently and remain unseen.
                    exampleofuse: Used when sneaking past enemies or hiding.
                    commonclasses:
                      - Rogue
                      - Ranger
                      - Monk
                      - Bard
        '404':
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Skill not found

  /api/classes:
    get:
      tags:
        - Classes
      operationId: getClasses
      summary: List all classes
      description: |
        Returns a lightweight list of RPG classes.

        This endpoint exposes only:
        - `id`
        - `name`
      responses:
        '200':
          description: Classes returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassListItem'
              example:
                - id: 1
                  name: Barbarian
                - id: 2
                  name: Bard
                - id: 3
                  name: Cleric
                - id: 4
                  name: Druid
        '500':
          description: Failed to fetch classes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch classes

  /api/classes/{identifier}:
    get:
      tags:
        - Classes
      operationId: getClassByIdentifier
      summary: Get class detail by identifier
      description: |
        Returns detailed information about a class.

        Supported identifiers:
        - numeric id, for example `/api/classes/12`
        - slug, for example `/api/classes/wizard`
        - normalized name, for example `/api/classes/fighter`
      parameters:
        - name: identifier
          in: path
          required: true
          description: Class identifier as numeric id, slug, or normalized name.
          schema:
            type: string
          examples:
            byId:
              summary: Search by id
              value: '12'
            bySlug:
              summary: Search by slug
              value: wizard
            byName:
              summary: Search by normalized name
              value: fighter
      responses:
        '200':
          description: Class found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassDetail'
              examples:
                fighter:
                  summary: Fighter detail
                  value:
                    id: 5
                    name: Fighter
                    slug: fighter
                    description: A master of weapons and armor who dominates the battlefield through martial skill, endurance, and tactical expertise.
                    role: melee
                    hitdie: 10
                    primaryattributes:
                      - STR
                      - DEX
                    recommendedskills:
                      - Athletics
                      - Perception
                      - Intimidation
                      - Survival
                      - Acrobatics
                    savingthrows:
                      - STR
                      - CON
                    spellcasting: null
                    subclasses:
                      - Champion
                    levelprogression: []
                wizard:
                  summary: Wizard detail
                  value:
                    id: 12
                    name: Wizard
                    slug: wizard
                    description: A learned arcane scholar who studies the inner workings of magic to prepare spells, master rituals, and wield unmatched magical versatility.
                    role: caster
                    hitdie: 6
                    primaryattributes:
                      - INT
                    recommendedskills:
                      - Arcana
                      - Investigation
                      - History
                      - Nature
                      - Religion
                    savingthrows:
                      - INT
                      - WIS
                    spellcasting:
                      ability: INT
                      usesSpellbook: true
                      canCastRituals: true
                    subclasses:
                      - Evoker
                    levelprogression: []
        '404':
          description: Class not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Class not found
        '500':
          description: Failed to fetch class detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch class detail

  /api/spells:
    get:
      tags:
        - Spells
      operationId: getSpells
      summary: List all spells
      description: |
        Returns a lightweight list of spells.

        This endpoint exposes:
        - `id`
        - `name`
        - `level`
        - `levelLabel`
      responses:
        '200':
          description: Spells returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SpellListItem'
              example:
                - id: 1
                  name: Acid Splash
                  level: 0
                  levelLabel: Cantrip
                - id: 18
                  name: Alarm
                  level: 1
                  levelLabel: Level 1
                - id: 20
                  name: Animal Friendship
                  level: 1
                  levelLabel: Level 1
        '500':
          description: Failed to fetch spells
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch spells

  /api/spells/{identifier}:
    get:
      tags:
        - Spells
      operationId: getSpellByIdentifier
      summary: Get spell detail by identifier
      description: |
        Returns detailed information about a spell.

        Supported identifiers:
        - numeric id, for example `/api/spells/18`
        - slug, for example `/api/spells/acid-splash`
        - normalized name, for example `/api/spells/alarm`
      parameters:
        - name: identifier
          in: path
          required: true
          description: Spell identifier as numeric id, slug, or normalized name.
          schema:
            type: string
          examples:
            byId:
              summary: Search by id
              value: '18'
            bySlug:
              summary: Search by slug
              value: acid-splash
            byName:
              summary: Search by normalized name
              value: alarm
      responses:
        '200':
          description: Spell found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpellDetail'
              examples:
                acidSplash:
                  summary: Acid Splash detail
                  value:
                    id: 1
                    name: Acid Splash
                    slug: acid-splash
                    source: Player's Handbook
                    school: Evocation
                    level: 0
                    levelLabel: Cantrip
                    castingTime: Action
                    range: 60 feet
                    components:
                      verbal: true
                      somatic: true
                      material: false
                      materialDescription: null
                    duration: Instantaneous
                    description: You create an acidic bubble at a point within range, where it explodes in a 5-foot-radius Sphere. Each creature in that Sphere must succeed on a Dexterity saving throw or take 1d6 Acid damage.
                    classes:
                      - Sorcerer
                      - Wizard
                    scaling:
                      entries:
                        - level: 5
                          description: damage increases to 2d6
                        - level: 11
                          description: damage increases to 3d6
                        - level: 17
                          description: damage increases to 4d6
                alarm:
                  summary: Alarm detail
                  value:
                    id: 18
                    name: Alarm
                    slug: alarm
                    source: Player's Handbook
                    school: Abjuration
                    level: 1
                    levelLabel: Level 1
                    castingTime: 1 minute or Ritual
                    range: 30 feet
                    components:
                      verbal: true
                      somatic: true
                      material: true
                      materialDescription: a bell and silver wire
                    duration: 8 hours
                    description: |
                      You set an alarm against intrusion. Choose a door, a window, or an area within range that is no larger than a 20-foot Cube. Until the spell ends, an alarm alerts you whenever a creature touches or enters the warded area. When you cast the spell, you can designate creatures that won't set off the alarm. You also choose whether the alarm is audible or mental:

                      Audible Alarm. The alarm produces the sound of a handbell for 10 seconds within 60 feet of the warded area.

                      Mental Alarm. You are alerted by a mental ping if you are within 1 mile of the warded area. This ping awakens you if you're asleep.
                    classes:
                      - Ranger
                      - Wizard
                    scaling: null
        '404':
          description: Spell not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Spell not found
        '500':
          description: Failed to fetch spell detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch spell detail

  /api/species:
    get:
      tags:
        - Species
      operationId: getSpecies
      summary: List all species
      description: |
        Returns a lightweight list of species.

        This endpoint exposes only:
        - `id`
        - `name`
      responses:
        '200':
          description: Species returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SpeciesListItem'
              example:
                - id: 1
                  name: Dragonborn
                - id: 2
                  name: Dwarf
                - id: 3
                  name: Elf
        '500':
          description: Failed to fetch species
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch species

  /api/species/{identifier}:
    get:
      tags:
        - Species
      operationId: getSpeciesByIdentifier
      summary: Get species detail by identifier
      description: |
        Returns detailed information about a species.

        Supported identifiers:
        - numeric id, for example `/api/species/1`
        - slug, for example `/api/species/dragonborn`
        - normalized name, for example `/api/species/elf`
      parameters:
        - name: identifier
          in: path
          required: true
          description: Species identifier as numeric id, name, or slug. Name and slug lookup are case-insensitive.
          schema:
            type: string
          examples:
            byId:
              summary: Search by id
              value: '1'
            bySlug:
              summary: Search by slug
              value: dragonborn
            byName:
              summary: Search by name
              value: elf
      responses:
        '200':
          description: Species found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeciesDetail'
              examples:
                dragonborn:
                  summary: Dragonborn detail
                  value:
                    id: 1
                    name: Dragonborn
                    slug: dragonborn
                    description: Dragonborn look like wingless, bipedal dragons.
                    creatureType: Humanoid
                    size: Medium
                    speed: 30
                    specialTraits:
                      - name: Draconic Ancestry
                        description: You have a dragon ancestor, which grants you a Breath Weapon and damage resistance tied to that ancestry.
                elf:
                  summary: Elf detail
                  value:
                    id: 3
                    name: Elf
                    slug: elf
                    description: Elves are a magical people of otherworldly grace.
                    creatureType: Humanoid
                    size: Medium
                    speed: 30
                    specialTraits:
                      - name: Darkvision
                        description: You have Darkvision with a range of 60 feet.
        '404':
          description: Species not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Species not found
        '500':
          description: Failed to fetch species detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch species detail

  /api/characters:
    get:
      tags:
        - Characters
      operationId: getCharacters
      summary: List authenticated owner characters
      description: |
        Returns the characters owned by the authenticated owner.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Characters returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CharacterListItem'
              example:
                - id: 101
                  name: Merien
                  status: draft
                  level: 1
                - id: 102
                  name: Arin
                  status: complete
                  level: 3
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '500':
          description: Failed to fetch characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch characters
    post:
      tags:
        - Characters
      operationId: createCharacter
      summary: Create character
      description: |
        Creates a character for the authenticated owner.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterCreateRequestBody'
            examples:
              draftCharacter:
                summary: Create draft character
                value:
                  name: Merien
              partialCharacter:
                summary: Create character with class
                value:
                  name: Arin
                  classId: 12
      responses:
        '201':
          description: Character created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterResponseBody'
              example:
                id: 101
                name: Merien
                status: draft
                classId: null
                speciesId: null
                backgroundId: null
                level: 1
                missingFields:
                  - classId
                  - speciesId
                  - backgroundId
                classDetails: null
                speciesDetails: null
        '400':
          description: Invalid character request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid character request payload
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '500':
          description: Failed to create character
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to create character

  /api/characters/{id}:
    get:
      tags:
        - Characters
      operationId: getCharacterById
      summary: Get character detail
      description: |
        Returns a single character owned by the authenticated owner.

        When related data exists, the detail payload can include nested:
        - `classDetails`
        - `speciesDetails`

        The current implementation keeps `backgroundId` as a scalar reference and does not yet return nested `backgroundDetails`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      responses:
        '200':
          description: Character found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterResponseBody'
              example:
                id: 101
                name: Merien
                status: draft
                classId: 12
                speciesId: 3
                backgroundId: 13
                level: 1
                missingFields:
                  - backgroundId
                classDetails:
                  id: 12
                  name: Wizard
                  slug: wizard
                  description: A learned arcane scholar who studies the inner workings of magic to prepare spells, master rituals, and wield unmatched magical versatility.
                  role: caster
                  hitDie: 6
                  primaryAttributes:
                    - INT
                  recommendedSkills:
                    - Arcana
                    - Investigation
                    - History
                    - Nature
                    - Religion
                  savingThrows:
                    - INT
                    - WIS
                  spellcasting:
                    ability: INT
                    usesSpellbook: true
                    canCastRituals: true
                  subclasses:
                    - Evoker
                  featuresByLevel: []
                speciesDetails:
                  id: 3
                  name: Elf
                  slug: elf
                  description: Elves are a magical people of otherworldly grace.
                  creatureType: Humanoid
                  size: Medium
                  speed: 30
                  specialTraits:
                    - name: Darkvision
                      description: You have Darkvision with a range of 60 feet.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Character not found
        '500':
          description: Failed to fetch character detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch character detail
    patch:
      tags:
        - Characters
      operationId: updateCharacter
      summary: Update character
      description: |
        Updates a single character owned by the authenticated owner and returns the same enriched detail shape, including `classDetails` and `speciesDetails` when those relations exist.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterUpdateRequestBody'
            examples:
              assignClass:
                summary: Assign wizard class
                value:
                  classId: 12
              updateNameAndLevel:
                summary: Update name and level
                value:
                  name: Merien the Wise
                  level: 2
      responses:
        '200':
          description: Character updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterResponseBody'
        '400':
          description: Invalid character request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid character request payload
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Character not found
        '500':
          description: Failed to update character
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to update character

  /api/characters/{id}/spell-options:
    get:
      tags:
        - Characters
      operationId: getCharacterSpellOptions
      summary: Get character spell options
      description: |
        Returns the spells available to the character based on the assigned class.
        If the character has no spellcasting class, `spells` is returned as an empty array.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      responses:
        '200':
          description: Character spell options returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterSpellOptionsResponseBody'
              examples:
                nonCaster:
                  summary: Non-spellcasting class
                  value:
                    characterId: 101
                    classId: 1
                    className: Barbarian
                    spells: []
                wizard:
                  summary: Wizard spell options
                  value:
                    characterId: 101
                    classId: 12
                    className: Wizard
                    spells:
                      - id: 1
                        name: Acid Splash
                        level: 0
                        levelLabel: Cantrip
                      - id: 18
                        name: Alarm
                        level: 1
                        levelLabel: Level 1
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Character not found
        '500':
          description: Failed to fetch character spell options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch character spell options

  /api/characters/{id}/spell-selection:
    get:
      tags:
        - Characters
      operationId: getCharacterSpellSelection
      summary: Get character spell selection state
      description: |
        Returns current selection rules, selected spells, and available spells for the character.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      responses:
        '200':
          description: Character spell selection returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterSpellSelectionResponseBody'
              example:
                characterId: 101
                classId: 12
                className: Wizard
                level: 1
                selectionRules:
                  canSelectSpells: true
                  selectionType: prepared
                  maxCantrips: 3
                  maxSpells: 0
                selectedSpells: []
                availableSpells:
                  - id: 1
                    name: Acid Splash
                    level: 0
                    levelLabel: Cantrip
                  - id: 18
                    name: Alarm
                    level: 1
                    levelLabel: Level 1
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Character not found
        '500':
          description: Failed to fetch character spell selection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to fetch character spell selection

  /api/characters/{id}/spells:
    put:
      tags:
        - Characters
      operationId: updateCharacterSpells
      summary: Replace selected character spells
      description: |
        Replaces the character's selected spells based on the current spell selection rules.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterSpellSelectionUpdateRequestBody'
            example:
              spellIds:
                - 1
                - 2
                - 3
      responses:
        '200':
          description: Character spells updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterSpellSelectionResponseBody'
        '400':
          description: Invalid character spell selection payload or invalid spell selection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPayload:
                  summary: Invalid payload
                  value:
                    error: Invalid character spell selection payload
                duplicates:
                  summary: Duplicate spell ids
                  value:
                    error: Duplicate spell ids are not allowed
                unavailableSelection:
                  summary: Class cannot select spells
                  value:
                    error: Spell selection is not available for this character
                invalidSpell:
                  summary: Invalid spell id for character
                  value:
                    error: One or more spells are invalid for this character
                tooManyCantrips:
                  summary: Too many cantrips
                  value:
                    error: Too many cantrips selected
                tooManySpells:
                  summary: Too many leveled spells
                  value:
                    error: Too many spells selected
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Character not found
        '500':
          description: Failed to update character spells
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to update character spells

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CharacterId:
      name: id
      in: path
      required: true
      description: Character numeric identifier.
      schema:
        type: integer
        minimum: 1

  schemas:
    TokenRequestBody:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: demo
        password:
          type: string
          example: demo123

    TokenResponseBody:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwib3duZXJJZCI6MSwidXNlcm5hbWUiOiJkZW1vIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjE3MDAwMDM2MDB9.signature

    AttributeShortname:
      type: string
      enum:
        - STR
        - DEX
        - CON
        - INT
        - WIS
        - CHA
      example: STR

    SkillName:
      type: string
      enum:
        - Athletics
        - Acrobatics
        - Sleight of Hand
        - Stealth
        - Arcana
        - History
        - Investigation
        - Nature
        - Religion
        - Animal Handling
        - Insight
        - Medicine
        - Perception
        - Survival
        - Deception
        - Intimidation
        - Performance
        - Persuasion
      example: Athletics

    Attribute:
      type: object
      required:
        - id
        - name
        - shortname
        - description
        - skills
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Strength
        shortname:
          $ref: '#/components/schemas/AttributeShortname'
        description:
          type: string
          example: Measures physical power, carrying capacity, and effectiveness in brute-force actions such as lifting, pushing, and melee attacks.
        skills:
          type: array
          description: List of skill names associated with the attribute.
          items:
            $ref: '#/components/schemas/SkillName'
          example:
            - Athletics

    BackgroundListItem:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Acolyte

    BackgroundDetail:
      type: object
      required:
        - id
        - name
        - slug
        - description
        - abilityScores
        - feat
        - skillProficiencies
        - toolProficiency
        - equipmentOptions
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Acolyte
        slug:
          type: string
          example: acolyte
        description:
          type: string
          example: You devoted yourself to service in a temple, either nestled in a town or secluded in a sacred grove.
        abilityScores:
          type: array
          items:
            $ref: '#/components/schemas/AttributeShortname'
          example:
            - INT
            - WIS
            - CHA
        feat:
          type: string
          example: Magic Initiate (Cleric)
        skillProficiencies:
          type: array
          items:
            $ref: '#/components/schemas/SkillName'
          example:
            - Insight
            - Religion
        toolProficiency:
          type: string
          nullable: true
          example: Calligrapher's Supplies
        equipmentOptions:
          type: array
          items:
            type: string
          example:
            - Calligrapher's Supplies, Book (prayers), Holy Symbol, Parchment (10 sheets), Robe, 8 GP
            - 50 GP

    SkillListItem:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          example: 1
        name:
          $ref: '#/components/schemas/SkillName'

    SkillDetail:
      type: object
      required:
        - id
        - name
        - attribute
        - description
        - exampleofuse
        - commonclasses
      properties:
        id:
          type: integer
          example: 1
        name:
          $ref: '#/components/schemas/SkillName'
        attribute:
          $ref: '#/components/schemas/AttributeShortname'
        description:
          type: string
          example: Represents physical capability in actions such as climbing, jumping, swimming, or forcing objects through strength.
        exampleofuse:
          type: string
          example: Used when a character tries to climb a castle wall or force open a heavy gate.
        commonclasses:
          type: array
          items:
            type: string
          example:
            - Fighter
            - Barbarian
            - Paladin
            - Ranger

    ClassRole:
      type: string
      enum:
        - melee
        - caster
        - support
        - stealth
        - hybrid
      example: caster

    ClassListItem:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          example: 12
        name:
          type: string
          example: Wizard

    ClassSpellcasting:
      type: object
      required:
        - ability
      properties:
        ability:
          $ref: '#/components/schemas/AttributeShortname'
        usesSpellbook:
          type: boolean
          example: true
        canCastRituals:
          type: boolean
          example: true

    ClassFeatureItem:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          example: Spellcasting
        description:
          type: string
          example: You can prepare and cast wizard spells.

    ClassLevelProgressionItem:
      type: object
      required:
        - level
        - features
      properties:
        level:
          type: integer
          example: 1
        features:
          type: array
          items:
            $ref: '#/components/schemas/ClassFeatureItem'

    ClassDetail:
      type: object
      required:
        - id
        - name
        - slug
        - primaryattributes
        - recommendedskills
        - savingthrows
        - hitdie
        - role
        - description
        - spellcasting
        - subclasses
        - levelprogression
      properties:
        id:
          type: integer
          example: 12
        name:
          type: string
          example: Wizard
        slug:
          type: string
          example: wizard
        primaryattributes:
          type: array
          items:
            $ref: '#/components/schemas/AttributeShortname'
          example:
            - INT
        recommendedskills:
          type: array
          items:
            $ref: '#/components/schemas/SkillName'
          example:
            - Arcana
            - Investigation
            - History
            - Nature
            - Religion
        savingthrows:
          type: array
          items:
            $ref: '#/components/schemas/AttributeShortname'
          example:
            - INT
            - WIS
        hitdie:
          type: integer
          example: 6
        role:
          $ref: '#/components/schemas/ClassRole'
        description:
          type: string
          example: A learned arcane scholar who studies the inner workings of magic to prepare spells, master rituals, and wield unmatched magical versatility.
        spellcasting:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ClassSpellcasting'
        subclasses:
          type: array
          items:
            type: string
          example:
            - Evoker
        levelprogression:
          type: array
          items:
            $ref: '#/components/schemas/ClassLevelProgressionItem'

    SpellListItem:
      type: object
      required:
        - id
        - name
        - level
        - levelLabel
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Acid Splash
        level:
          type: integer
          example: 0
        levelLabel:
          type: string
          example: Cantrip

    SpellComponents:
      type: object
      required:
        - verbal
        - somatic
        - material
        - materialDescription
      properties:
        verbal:
          type: boolean
          example: true
        somatic:
          type: boolean
          example: true
        material:
          type: boolean
          example: false
        materialDescription:
          type: string
          nullable: true
          example: null

    SpellScalingEntry:
      type: object
      required:
        - level
        - description
      properties:
        level:
          type: integer
          example: 5
        description:
          type: string
          example: damage increases to 2d6

    SpellScaling:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/SpellScalingEntry'

    SpellDetail:
      type: object
      required:
        - id
        - name
        - slug
        - source
        - school
        - level
        - levelLabel
        - castingTime
        - range
        - components
        - duration
        - description
        - classes
        - scaling
      properties:
        id:
          type: integer
          example: 18
        name:
          type: string
          example: Alarm
        slug:
          type: string
          example: alarm
        source:
          type: string
          example: Player's Handbook
        school:
          type: string
          example: Abjuration
        level:
          type: integer
          example: 1
        levelLabel:
          type: string
          example: Level 1
        castingTime:
          type: string
          example: 1 minute or Ritual
        range:
          type: string
          example: 30 feet
        components:
          $ref: '#/components/schemas/SpellComponents'
        duration:
          type: string
          example: 8 hours
        description:
          type: string
          example: You set an alarm against intrusion.
        classes:
          type: array
          items:
            type: string
          example:
            - Ranger
            - Wizard
        scaling:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SpellScaling'

    SpeciesListItem:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Dragonborn

    SpeciesTrait:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          example: Darkvision
        description:
          type: string
          example: You have Darkvision with a range of 60 feet.

    SpeciesDetail:
      type: object
      required:
        - id
        - name
        - slug
        - description
        - creatureType
        - size
        - speed
        - specialTraits
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Dragonborn
        slug:
          type: string
          example: dragonborn
        description:
          type: string
          example: Dragonborn look like wingless, bipedal dragons.
        creatureType:
          type: string
          example: Humanoid
        size:
          type: string
          example: Medium
        speed:
          type: integer
          example: 30
        specialTraits:
          type: array
          items:
            $ref: '#/components/schemas/SpeciesTrait'

    CharacterStatus:
      type: string
      enum:
        - draft
        - complete
      example: draft

    CharacterMissingField:
      type: string
      enum:
        - classId
        - speciesId
        - backgroundId
      example: classId

    CharacterListItem:
      type: object
      required:
        - id
        - name
        - status
        - level
      properties:
        id:
          type: integer
          example: 101
        name:
          type: string
          example: Merien
        status:
          $ref: '#/components/schemas/CharacterStatus'
        level:
          type: integer
          example: 1

    CharacterCreateRequestBody:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Merien
        classId:
          type: integer
          nullable: true
          minimum: 1
          example: 12
        speciesId:
          type: integer
          nullable: true
          minimum: 1
          example: 1
        backgroundId:
          type: integer
          nullable: true
          minimum: 1
          example: 13
        level:
          type: integer
          nullable: true
          minimum: 1
          example: 1

    CharacterUpdateRequestBody:
      type: object
      properties:
        name:
          type: string
          example: Merien the Wise
        classId:
          type: integer
          nullable: true
          minimum: 1
          example: 12
        speciesId:
          type: integer
          nullable: true
          minimum: 1
          example: 1
        backgroundId:
          type: integer
          nullable: true
          minimum: 1
          example: 13
        level:
          type: integer
          nullable: true
          minimum: 1
          example: 2

    CharacterClassFeatureItem:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          example: Spellcasting
        description:
          type: string
          example: You can prepare and cast wizard spells.

    CharacterClassProgressionItem:
      type: object
      required:
        - level
        - features
      properties:
        level:
          type: integer
          example: 1
        features:
          type: array
          items:
            $ref: '#/components/schemas/CharacterClassFeatureItem'

    CharacterClassDetails:
      type: object
      required:
        - id
        - name
        - slug
        - description
        - role
        - hitDie
        - primaryAttributes
        - recommendedSkills
        - savingThrows
        - spellcasting
        - subclasses
        - featuresByLevel
      properties:
        id:
          type: integer
          example: 12
        name:
          type: string
          example: Wizard
        slug:
          type: string
          example: wizard
        description:
          type: string
          example: A learned arcane scholar who studies the inner workings of magic to prepare spells, master rituals, and wield unmatched magical versatility.
        role:
          type: string
          example: caster
        hitDie:
          type: integer
          example: 6
        primaryAttributes:
          type: array
          items:
            $ref: '#/components/schemas/AttributeShortname'
          example:
            - INT
        recommendedSkills:
          type: array
          items:
            $ref: '#/components/schemas/SkillName'
          example:
            - Arcana
            - Investigation
        savingThrows:
          type: array
          items:
            $ref: '#/components/schemas/AttributeShortname'
          example:
            - INT
            - WIS
        spellcasting:
          type: object
          nullable: true
          additionalProperties: true
          example:
            ability: INT
            usesSpellbook: true
            canCastRituals: true
        subclasses:
          type: array
          items:
            type: string
          example:
            - Evoker
        featuresByLevel:
          type: array
          items:
            $ref: '#/components/schemas/CharacterClassProgressionItem'

    CharacterResponseBody:
      type: object
      required:
        - id
        - name
        - status
        - classId
        - speciesId
        - backgroundId
        - level
        - missingFields
        - classDetails
        - speciesDetails
      properties:
        id:
          type: integer
          example: 101
        name:
          type: string
          example: Merien
        status:
          $ref: '#/components/schemas/CharacterStatus'
        classId:
          type: integer
          nullable: true
          example: 12
        speciesId:
          type: integer
          nullable: true
          example: null
        backgroundId:
          type: integer
          nullable: true
          example: null
        level:
          type: integer
          example: 1
        missingFields:
          type: array
          items:
            $ref: '#/components/schemas/CharacterMissingField'
          example:
            - speciesId
            - backgroundId
        classDetails:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CharacterClassDetails'
        speciesDetails:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SpeciesDetail'

    CharacterSpellOptionItem:
      type: object
      required:
        - id
        - name
        - level
        - levelLabel
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Acid Splash
        level:
          type: integer
          example: 0
        levelLabel:
          type: string
          example: Cantrip

    CharacterSpellOptionsResponseBody:
      type: object
      required:
        - characterId
        - classId
        - className
        - spells
      properties:
        characterId:
          type: integer
          example: 101
        classId:
          type: integer
          nullable: true
          example: 12
        className:
          type: string
          nullable: true
          example: Wizard
        spells:
          type: array
          items:
            $ref: '#/components/schemas/CharacterSpellOptionItem'

    CharacterSpellSelectionType:
      type: string
      enum:
        - known
        - prepared
        - cantrip
      example: prepared

    CharacterSpellSelectionRule:
      type: object
      required:
        - canSelectSpells
        - selectionType
        - maxCantrips
        - maxSpells
      properties:
        canSelectSpells:
          type: boolean
          example: true
        selectionType:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CharacterSpellSelectionType'
        maxCantrips:
          type: integer
          example: 3
        maxSpells:
          type: integer
          example: 0

    CharacterSelectedSpellItem:
      allOf:
        - $ref: '#/components/schemas/CharacterSpellOptionItem'
        - type: object
          required:
            - selectionType
          properties:
            selectionType:
              $ref: '#/components/schemas/CharacterSpellSelectionType'

    CharacterSpellSelectionResponseBody:
      type: object
      required:
        - characterId
        - classId
        - className
        - level
        - selectionRules
        - selectedSpells
        - availableSpells
      properties:
        characterId:
          type: integer
          example: 101
        classId:
          type: integer
          nullable: true
          example: 12
        className:
          type: string
          nullable: true
          example: Wizard
        level:
          type: integer
          example: 1
        selectionRules:
          $ref: '#/components/schemas/CharacterSpellSelectionRule'
        selectedSpells:
          type: array
          items:
            $ref: '#/components/schemas/CharacterSelectedSpellItem'
        availableSpells:
          type: array
          items:
            $ref: '#/components/schemas/CharacterSpellOptionItem'

    CharacterSpellSelectionUpdateRequestBody:
      type: object
      required:
        - spellIds
      properties:
        spellIds:
          type: array
          items:
            type: integer
            minimum: 1
          example:
            - 1
            - 2
            - 3

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Skill not found
