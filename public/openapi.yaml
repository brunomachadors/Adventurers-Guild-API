        - total
      properties:
        name:
          $ref: '#/components/schemas/SkillName'
        ability:
          $ref: '#/components/schemas/AttributeShortname'
        isProficient:
          type: boolean
          example: true
        abilityModifier:
          type: integer
          example: 3
        proficiencyBonus:
          type: integer
          example: 2
        total:
          type: integer
          example: 5

    CharacterEquipmentItem:
      type: object
      required:
        - id
        - name
        - category
        - type
        - quantity
        - isEquipped
      properties:
        id:
          type: integer
          example: 42
        name:
          type: string
          example: Longsword
        category:
          type: string
          example: Weapon
        type:
          type: string
          example: Weapon
        quantity:
          type: integer
          minimum: 1
          example: 1
        isEquipped:
          type: boolean
          example: true

    CharacterEquipmentResponseBody:
      type: object
      required:
        - characterId
        - equipment
      properties:
        characterId:
          type: integer
          example: 101
        equipment:
          type: array
          items:
            $ref: '#/components/schemas/CharacterEquipmentItem'

    CharacterEquipmentAddRequestBody:
      type: object
      required:
        - equipmentId
      properties:
        equipmentId:
          type: integer
          minimum: 1
          example: 42
        quantity:
          type: integer
          minimum: 1
          default: 1
          example: 1
        isEquipped:
          type: boolean
          default: false
          example: true

    CharacterEquipmentUpdateRequestBody:
      type: object
      description: At least one of `quantity` or `isEquipped` must be present.
      properties:
        quantity:
          type: integer
          minimum: 1
          example: 2
        isEquipped:
          type: boolean
          example: true
      minProperties: 1

    CharacterAbilityScoreOptionsResponseBody:
      type: object
      required:
        - characterId
        - backgroundId
        - backgroundName
        - selectionRules
        - selectedAbilityScores
        - availableChoices
      properties:
        characterId:
          type: integer
          example: 101
        backgroundId:
          type: integer
          nullable: true
          example: 13
        backgroundName:
          type: string
          nullable: true
          example: Sage
        selectionRules:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CharacterAbilityScoreRules'
        selectedAbilityScores:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CharacterResolvedAbilityScores'
        availableChoices:
          type: array
          items:
            $ref: '#/components/schemas/AttributeShortname'
          example:
            - CON
            - INT
            - WIS

    CharacterAbilityScoresUpdateRequestBody:
      type: object
      required:
        - abilityScores
      properties:
        abilityScores:
          $ref: '#/components/schemas/CharacterAbilityScoresInput'

    CharacterSpellOptionsResponseBody:
      type: object
      required:
        - characterId
        - classId
        - className
        - spells
      properties:
        characterId:
          type: integer
          example: 101
        classId:
          type: integer
          nullable: true
          example: 12
        className:
          type: string
          nullable: true
          example: Wizard
        spells:
          type: array
          items:
            $ref: '#/components/schemas/CharacterSpellOptionItem'

    CharacterSpellSelectionType:
      type: string
      enum:
        - known
        - prepared
        - cantrip
      example: prepared

    CharacterSpellSelectionRule:
      type: object
      required:
        - canSelectSpells
        - selectionType
        - maxCantrips
        - maxSpells
      properties:
        canSelectSpells:
          type: boolean
          example: true
        selectionType:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CharacterSpellSelectionType'
        maxCantrips:
          type: integer
          example: 3
        maxSpells:
          type: integer
          example: 0

    CharacterSelectedSpellItem:
      allOf:
        - $ref: '#/components/schemas/CharacterSpellOptionItem'
        - type: object
          required:
            - selectionType
          properties:
            selectionType:
              $ref: '#/components/schemas/CharacterSpellSelectionType'

    CharacterSpellSelectionResponseBody:
      type: object
      required:
        - characterId
        - classId
        - className
        - level
        - selectionRules
        - selectedSpells
        - availableSpells
      properties:
        characterId:
          type: integer
          example: 101
        classId:
          type: integer
          nullable: true
          example: 12
        className:
          type: string
          nullable: true
          example: Wizard
        level:
          type: integer
          example: 1
        selectionRules:
          $ref: '#/components/schemas/CharacterSpellSelectionRule'
        selectedSpells:
          type: array
          items:
            $ref: '#/components/schemas/CharacterSelectedSpellItem'
        availableSpells:
          type: array
          items:
            $ref: '#/components/schemas/CharacterSpellOptionItem'

    CharacterSpellSelectionUpdateRequestBody:
      type: object
      required:
        - spellIds
      properties:
        spellIds:
          type: array
          items:
            type: integer
            minimum: 1
          example:
            - 1
            - 2
            - 3

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Skill not found
