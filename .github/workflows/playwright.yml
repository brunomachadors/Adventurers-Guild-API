name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      E2E_AUTH_USERNAME: ${{ secrets.E2E_AUTH_USERNAME }}
      E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
      POSTMAN_BASE_URL: https://adventurers-guild-api.vercel.app/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Start application
        run: npm run start &

      - name: Give application time to boot
        run: sleep 10

      - name: Run Playwright tests
        run: npx playwright test --reporter=line

      - name: Generate Postman validation bundle
        run: npm run postman:site -- --base-url "$POSTMAN_BASE_URL" --output-dir generated/postman-ci

      - name: Run Newman validation
        run: >
          npx newman run generated/postman-ci/adventurers-guild.postman_collection.json
          -e generated/postman-ci/adventurers-guild.postman_environment.json

      - name: Upload Postman bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-validation-bundle
          path: generated/postman-ci
